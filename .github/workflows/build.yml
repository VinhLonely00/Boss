name: Build Minecraft Plugin

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Bước 1: Tải mã nguồn từ repo về máy ảo của GitHub
    - name: Checkout code
      uses: actions/checkout@v4

    # Bước 2: Cài đặt môi trường Java 21 (Bắt buộc cho Minecraft 1.21+)
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # Bước 3: Chạy lệnh Maven để tự động dịch code chữ thành file .jar
    - name: Build with Maven
      run: mvn clean package --file pom.xml

    # Bước 4: Đóng gói và lưu file .jar lên mục Artifacts để bạn tải về
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SuperWardenBoss-Plugin
        path: target/*.jar